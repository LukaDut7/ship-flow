appId: dev.shipflow.desktop
productName: Ship Flow
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
extraResources:
  - from: ../.next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .runtime
    to: node-bin
    filter:
      - "**/*"
asar: true
asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: false  # Enable when Apple Developer account is set up

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: "${productName}-${version}-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

linux:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  executableName: ship-flow
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development

protocols:
  - name: Ship Flow
    schemes:
      - shipflow

publish:
  provider: github
  releaseType: release
