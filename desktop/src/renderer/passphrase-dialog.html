<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <title>SSH Key Passphrase</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a1a;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }
    p { font-size: 14px; color: #aaa; margin-bottom: 16px; text-align: center; }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #0a0a0a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #e5e5e5;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #3b82f6; }
    .buttons { display: flex; gap: 8px; width: 100%; }
    button {
      flex: 1;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #e5e5e5;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button.primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    button.primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <p>Your SSH key is encrypted.<br>Enter the passphrase to unlock it.</p>
  <input type="password" id="passphrase" placeholder="Passphrase" autofocus>
  <div class="buttons">
    <button onclick="cancel()">Cancel</button>
    <button class="primary" onclick="submit()">OK</button>
  </div>
  <script>
    const input = document.getElementById("passphrase")
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submit()
      if (e.key === "Escape") cancel()
    })
    function submit() {
      window.shipflow.send("ssh:passphrase-response", input.value)
    }
    function cancel() {
      window.shipflow.send("ssh:passphrase-response", null)
    }
  </script>
</body>
</html>
